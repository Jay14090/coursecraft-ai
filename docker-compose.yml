services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: coursecraft
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports: ["5432:5432"]
    volumes: ["coursecraft-db:/var/lib/postgresql/data"]
  api:
    build: ./backend
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/coursecraft
    ports: ["8000:8000"]
    depends_on: [postgres]

volumes:
  coursecraft-db:
